# nginx reverse proxy for the lead scraper.
# Terminates HTTPS + basic auth, forwards to the app on 127.0.0.1:21003.
#
# Install:
#   sudo cp deploy/nginx-leadgen.conf /etc/nginx/sites-available/leadgen
#   sudo ln -s /etc/nginx/sites-available/leadgen /etc/nginx/sites-enabled/leadgen
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace YOUR_DOMAIN_OR_IP and the ssl_certificate paths below (see chat steps).

# ---- Redirect all plain HTTP to HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN_OR_IP;
    return 301 https://$host$request_uri;
}

# ---- HTTPS site ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name YOUR_DOMAIN_OR_IP;

    # TLS cert. For a real domain use certbot (it rewrites these lines).
    # For an IP-only box, point these at the self-signed pair from the chat steps.
    ssl_certificate     /etc/ssl/certs/leadgen.crt;
    ssl_certificate_key /etc/ssl/private/leadgen.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # ---- Password gate (protects the whole app) ----
    auth_basic           "Lead Scraper";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Scrapes can be big; allow a roomy response and don't cut long polls short.
    proxy_read_timeout   300s;
    client_max_body_size 5m;

    location / {
        proxy_pass         http://127.0.0.1:21003;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
